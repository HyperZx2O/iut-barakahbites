# ─────────────────────────────────────────────────────────────────────────────
# Nginx Reverse Proxy – IUT BarakahBites Frontend Gateway
#
# Routes:
#   http://localhost/          →  student-ui container  (port 3000)
#   http://localhost/admin/    →  admin-dashboard container (port 5174)
#
# The admin Vite dev server is configured with base: '/admin/' so it natively
# serves everything under /admin/...  We therefore do NOT strip the prefix —
# proxy_pass uses no trailing slash so /admin/src/main.jsx is forwarded as-is.
#
# Student-ui uses the default Vite base '/' and its assets have no prefix,
# so they are safely isolated from the admin assets.
# ─────────────────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {

    # ── Upstream definitions ────────────────────────────────────────────────
    upstream student_ui {
        server student-ui:3000;
    }

    upstream admin_dashboard {
        server admin-dashboard:5174;
    }

    # ── Main server block ───────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # ── Redirect bare /admin → /admin/ ─────────────────────────────────
        # Without the trailing slash React Router's basename doesn't match.
        location = /admin {
            return 301 /admin/;
        }

        # ── Admin dashboard – everything under /admin/ ──────────────────────
        # proxy_pass WITHOUT trailing slash → Nginx forwards the full URI
        # (e.g. /admin/src/main.jsx) to Vite which understands it because
        # Vite is started with base: '/admin/'.
        location /admin/ {
            proxy_pass http://admin_dashboard;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket upgrade — required for Vite HMR (hot-module reload)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_cache_bypass $http_upgrade;

            # Disable buffering so Vite SSE / streaming responses work
            proxy_buffering off;

            proxy_connect_timeout 60s;
            proxy_read_timeout    60s;
        }

        # ── Student UI – everything else ────────────────────────────────────
        location / {
            proxy_pass http://student_ui;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket upgrade — required for Vite HMR
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_cache_bypass $http_upgrade;

            proxy_buffering off;

            proxy_connect_timeout 60s;
            proxy_read_timeout    60s;
        }
    }
}
