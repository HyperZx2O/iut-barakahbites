services:
  # 1. Identity Provider
  - type: web
    name: iut-identity-provider
    runtime: docker
    dockerContext: .
    dockerfilePath: services/identity-provider/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: iut-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: iut-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # 2. Stock Service
  - type: web
    name: iut-stock-service
    runtime: docker
    dockerContext: .
    dockerfilePath: services/stock-service/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 3003
      - key: DATABASE_URL
        fromDatabase:
          name: iut-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: iut-redis
          property: connectionString

  # 3. Order Gateway
  - type: web
    name: iut-order-gateway
    runtime: docker
    dockerContext: .
    dockerfilePath: services/order-gateway/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 3002
      - key: REDIS_URL
        fromService:
          type: redis
          name: iut-redis
          property: connectionString
      - key: JWT_SECRET
        fromService:
          type: web
          name: iut-identity-provider
          property: envVar:JWT_SECRET
      - key: STOCK_SERVICE_URL
        fromService:
          type: web
          name: iut-stock-service
          property: host
      - key: KITCHEN_QUEUE_URL
        fromService:
          type: web
          name: iut-kitchen-queue
          property: host
      - key: NOTIFICATION_HUB_URL
        fromService:
          type: web
          name: iut-notification-hub
          property: host

  # 4. Kitchen Queue
  - type: web
    name: iut-kitchen-queue
    runtime: docker
    dockerContext: .
    dockerfilePath: services/kitchen-queue/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 3004
      - key: REDIS_URL
        fromService:
          type: redis
          name: iut-redis
          property: connectionString
      - key: NOTIFICATION_HUB_URL
        fromService:
          type: web
          name: iut-notification-hub
          property: host

  # 5. Notification Hub
  - type: web
    name: iut-notification-hub
    runtime: docker
    dockerContext: .
    dockerfilePath: services/notification-hub/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 3005
      - key: REDIS_URL
        fromService:
          type: redis
          name: iut-redis
          property: connectionString

  # 6. Student UI (Frontend)
  - type: static_site
    name: iut-student-ui
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_GATEWAY_URL
        fromService:
          type: web
          name: iut-order-gateway
          property: host
      - key: VITE_AUTH_URL
        fromService:
          type: web
          name: iut-identity-provider
          property: host
      - key: VITE_NOTIFICATION_URL
        fromService:
          type: web
          name: iut-notification-hub
          property: host

  # 7. Admin Dashboard (Frontend)
  - type: static_site
    name: iut-admin-dashboard
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_GATEWAY_URL
        fromService:
          type: web
          name: iut-order-gateway
          property: host
      - key: VITE_IDENTITY_URL
        fromService:
          type: web
          name: iut-identity-provider
          property: host
      - key: VITE_STOCK_URL
        fromService:
          type: web
          name: iut-stock-service
          property: host
      - key: VITE_KITCHEN_URL
        fromService:
          type: web
          name: iut-kitchen-queue
          property: host
      - key: VITE_NOTIFICATION_URL
        fromService:
          type: web
          name: iut-notification-hub
          property: host

# Infrastructure
databases:
  - name: iut-postgres
    plan: free

# Note: Render doesn't offer a free-tier Redis as a "Service". 
# This blueprint uses their Redis plugin which may require a card on file for 'Starter' plan.
# If you want 100% free without a card, use Upstash.com manually for Redis.
# I am including it here for automation completeness.
redis:
  - name: iut-redis
    plan: free
