services:
  # ── Infrastructure ────────────────────────────────────────────────────────

  - type: keyvalue
    name: iut-redis
    plan: free
    ipAllowList: []

  # ── Backend Services (Self-Contained) ─────────────────────────────────────

  # 1. Identity Provider
  - type: web
    name: iut-identity-provider
    plan: free
    runtime: docker
    rootDir: services/identity-provider
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: iut-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: iut-redis
          property: connectionString
      - key: JWT_SECRET
        value: "barakah_bites_dev_sprint_2026_super_secret"

  # 2. Stock Service
  - type: web
    name: iut-stock-service
    plan: free
    runtime: docker
    rootDir: services/stock-service
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 3003
      - key: DATABASE_URL
        fromDatabase:
          name: iut-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: iut-redis
          property: connectionString

  # 3. Notification Hub
  - type: web
    name: iut-notification-hub
    plan: free
    runtime: docker
    rootDir: services/notification-hub
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 3005
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: iut-redis
          property: connectionString
      # Export its own hostname so other services can build a URL
      - key: NOTIFICATION_HUB_HOST
        fromService:
          type: web
          name: iut-notification-hub
          property: host

  # 4. Kitchen Queue
  - type: web
    name: iut-kitchen-queue
    plan: free
    runtime: docker
    rootDir: services/kitchen-queue
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 3004
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: iut-redis
          property: connectionString
      - key: NOTIFICATION_HUB_HOST
        fromService:
          type: web
          name: iut-notification-hub
          property: host
      - key: NOTIFICATION_HUB_URL
        value: https://${NOTIFICATION_HUB_HOST}

  # 5. Order Gateway
  - type: web
    name: iut-order-gateway
    plan: free
    runtime: docker
    rootDir: services/order-gateway
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 3002
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: iut-redis
          property: connectionString
      - key: JWT_SECRET
        value: "barakah_bites_dev_sprint_2026_super_secret"
      - key: STOCK_SERVICE_HOST
        fromService:
          type: web
          name: iut-stock-service
          property: host
      - key: STOCK_SERVICE_URL
        value: https://${STOCK_SERVICE_HOST}
      - key: KITCHEN_QUEUE_HOST
        fromService:
          type: web
          name: iut-kitchen-queue
          property: host
      - key: KITCHEN_QUEUE_URL
        value: https://${KITCHEN_QUEUE_HOST}
      - key: NOTIFICATION_HUB_HOST
        fromService:
          type: web
          name: iut-notification-hub
          property: host
      - key: NOTIFICATION_HUB_URL
        value: https://${NOTIFICATION_HUB_HOST}

  # ── Frontends ─────────────────────────────────────────────────────────────

  # 6. Unified Frontend (Portal + Admin)
  - type: web
    name: iut-barakahbites-ui
    runtime: static
    rootDir: frontend/student-ui
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_GATEWAY_HOST
        fromService:
          type: web
          name: iut-order-gateway
          property: host
      - key: VITE_GATEWAY_URL
        value: https://${VITE_GATEWAY_HOST}
      - key: VITE_AUTH_HOST
        fromService:
          type: web
          name: iut-identity-provider
          property: host
      - key: VITE_AUTH_URL
        value: https://${VITE_AUTH_HOST}
      - key: VITE_STOCK_HOST
        fromService:
          type: web
          name: iut-stock-service
          property: host
      - key: VITE_STOCK_URL
        value: https://${VITE_STOCK_HOST}
      - key: VITE_KITCHEN_HOST
        fromService:
          type: web
          name: iut-kitchen-queue
          property: host
      - key: VITE_KITCHEN_URL
        value: https://${VITE_KITCHEN_HOST}
      - key: VITE_NOTIFICATION_HOST
        fromService:
          type: web
          name: iut-notification-hub
          property: host
      - key: VITE_NOTIFICATION_URL
        value: https://${VITE_NOTIFICATION_HOST}

# ── Postgres ──────────────────────────────────────────────────────────────────
databases:
  - name: iut-postgres
    plan: free
