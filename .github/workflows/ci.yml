name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: devsprint
          POSTGRES_PASSWORD: devsprint
          POSTGRES_DB: cafeteria_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379

    strategy:
      matrix:
        service: [identity-provider, order-gateway, stock-service, kitchen-queue, notification-hub]

    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json
      
      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci
      
      - name: Run unit tests
        working-directory: services/${{ matrix.service }}
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://devsprint:devsprint@localhost:5432/cafeteria_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
          STOCK_SERVICE_URL: http://localhost:3003
          KITCHEN_QUEUE_URL: http://localhost:3004
          NOTIFICATION_HUB_URL: http://localhost:3005

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: docker compose build
