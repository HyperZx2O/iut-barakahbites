services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devsprint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devsprint}
      POSTGRES_DB: ${POSTGRES_DB:-cafeteria}
    ports:
      - "54320:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U devsprint" ]
      interval: 5s
      retries: 5
    networks:
      - cafeteria-net

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      retries: 5
    networks:
      - cafeteria-net

  identity-provider:
    build: ./services/identity-provider
    container_name: identity-provider
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "3001:3001"
    environment:
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      DATABASE_URL: postgres://${POSTGRES_USER:-devsprint}:${POSTGRES_PASSWORD:-devsprint}@postgres:5432/${POSTGRES_DB:-cafeteria}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cafeteria-net

  order-gateway:
    build: ./services/order-gateway
    container_name: order-gateway
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "3002:3002"
    environment:
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      STOCK_SERVICE_URL: http://stock-service:3003
      KITCHEN_QUEUE_URL: http://kitchen-queue:3004
      NOTIFICATION_HUB_URL: http://notification-hub:3005
    depends_on:
      - redis
      - identity-provider
    networks:
      - cafeteria-net

  stock-service:
    build: ./services/stock-service
    container_name: stock-service
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-devsprint}:${POSTGRES_PASSWORD:-devsprint}@postgres:5432/${POSTGRES_DB:-cafeteria}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cafeteria-net

  kitchen-queue:
    build: ./services/kitchen-queue
    container_name: kitchen-queue
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3004/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "3004:3004"
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NOTIFICATION_HUB_URL: http://notification-hub:3005
    depends_on:
      - redis
    networks:
      - cafeteria-net

  notification-hub:
    build: ./services/notification-hub
    container_name: notification-hub
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3005/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "3005:3005"
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      - redis
    networks:
      - cafeteria-net

  student-ui:
    build: ./frontend/student-ui
    container_name: student-ui
    environment:
      VITE_GATEWAY_URL: http://localhost:3002
      VITE_NOTIFICATION_URL: http://localhost:3005
      VITE_AUTH_URL: http://localhost:3001
      VITE_ADMIN_URL: /admin
    stop_grace_period: 10s
    volumes:
      - ./frontend/student-ui:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
    networks:
      - cafeteria-net

  admin-dashboard:
    build: ./frontend/admin-dashboard
    container_name: admin-dashboard
    environment:
      VITE_IDENTITY_URL: http://localhost:3001
      VITE_GATEWAY_URL: http://localhost:3002
      VITE_STOCK_URL: http://localhost:3003
      VITE_KITCHEN_URL: http://localhost:3004
      VITE_NOTIFICATION_URL: http://localhost:3005
      VITE_STUDENT_URL: /
    stop_grace_period: 10s
    volumes:
      - ./frontend/admin-dashboard:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5174
    networks:
      - cafeteria-net

  frontend-proxy:
    image: nginx:1.27-alpine
    container_name: frontend-proxy
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - student-ui
      - admin-dashboard
    networks:
      - cafeteria-net

networks:
  cafeteria-net:
    driver: bridge

volumes:
  postgres_data:
