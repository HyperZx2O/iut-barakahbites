services:
  # 1. Identity Provider
  - type: web
    name: iut-identity-provider
    plan: free
    runtime: docker
    rootDir: services/identity-provider
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: iut-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: iut-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: 20

  # 2. Stock Service
  - type: web
    name: iut-stock-service
    plan: free
    runtime: docker
    rootDir: services/stock-service
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 3003
      - key: DATABASE_URL
        fromDatabase:
          name: iut-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: iut-redis
          property: connectionString
      - key: NODE_VERSION
        value: 20

  # 3. Order Gateway
  - type: web
    name: iut-order-gateway
    plan: free
    runtime: docker
    rootDir: services/order-gateway
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 3002
      - key: REDIS_URL
        fromService:
          type: redis
          name: iut-redis
          property: connectionString
      - key: JWT_SECRET
        fromService:
          type: web
          name: iut-identity-provider
          property: envVar:JWT_SECRET
      - key: STOCK_SERVICE_URL
        fromService:
          type: web
          name: iut-stock-service
          property: url
      - key: KITCHEN_QUEUE_URL
        fromService:
          type: web
          name: iut-kitchen-queue
          property: url
      - key: NOTIFICATION_HUB_URL
        fromService:
          type: web
          name: iut-notification-hub
          property: url
      - key: NODE_VERSION
        value: 20

  # 4. Kitchen Queue (Context root required for shared/)
  - type: web
    name: iut-kitchen-queue
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/kitchen-queue/Dockerfile
    envVars:
      - key: PORT
        value: 3004
      - key: REDIS_URL
        fromService:
          type: redis
          name: iut-redis
          property: connectionString
      - key: NOTIFICATION_HUB_URL
        fromService:
          type: web
          name: iut-notification-hub
          property: url
      - key: NODE_VERSION
        value: 20

  # 5. Notification Hub (Context root required for shared/)
  - type: web
    name: iut-notification-hub
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/notification-hub/Dockerfile
    envVars:
      - key: PORT
        value: 3005
      - key: REDIS_URL
        fromService:
          type: redis
          name: iut-redis
          property: connectionString
      - key: NODE_VERSION
        value: 20

  # 6. Student UI (Frontend)
  - type: static_site
    name: iut-student-ui
    rootDir: frontend/student-ui
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_GATEWAY_URL
        fromService:
          type: web
          name: iut-order-gateway
          property: url
      - key: VITE_AUTH_URL
        fromService:
          type: web
          name: iut-identity-provider
          property: url
      - key: VITE_NOTIFICATION_URL
        fromService:
          type: web
          name: iut-notification-hub
          property: url

  # 7. Admin Dashboard (Frontend)
  - type: static_site
    name: iut-admin-dashboard
    rootDir: frontend/admin-dashboard
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_GATEWAY_URL
        fromService:
          type: web
          name: iut-order-gateway
          property: url
      - key: VITE_IDENTITY_URL
        fromService:
          type: web
          name: iut-identity-provider
          property: url
      - key: VITE_STOCK_URL
        fromService:
          type: web
          name: iut-stock-service
          property: url
      - key: VITE_KITCHEN_URL
        fromService:
          type: web
          name: iut-kitchen-queue
          property: url
      - key: VITE_NOTIFICATION_URL
        fromService:
          type: web
          name: iut-notification-hub
          property: url

# Infrastructure
databases:
  - name: iut-postgres
    plan: free

redis:
  - name: iut-redis
    plan: free
    ipAllowList: [] # Required for free tier to allow all internal connections
